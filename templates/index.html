<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Self-Healing App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .card { border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .status-badge { font-size: 1.1rem; padding: 8px 20px; border-radius: 20px; }
  </style>
</head>
<body>
<div class="container py-5">
  <h1 class="text-center mb-2 fw-bold">🚀 Self-Healing DevOps App</h1>
  <p class="text-center text-muted mb-5">🚀 Automated CI/CD Pipeline - Version 2.0 | Team: Seema & Shradda</p>

  <div class="row g-4 justify-content-center">
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <h5 class="text-muted">Container Status</h5>
        <div id="status" class="status-badge bg-success text-white mt-2 mx-auto" style="display:inline-block">Loading...</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <h5 class="text-muted">Restart Count</h5>
        <h2 id="restarts" class="fw-bold text-danger mt-2">-</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <h5 class="text-muted">Uptime</h5>
        <h2 id="uptime" class="fw-bold text-primary mt-2">-</h2>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <small class="text-muted">Auto-refreshes every 5 seconds</small>
  </div>
</div>

<script>
  function fetchMonitor() {
    fetch('/monitor')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').textContent = data.container_status;
        document.getElementById('restarts').textContent = data.restart_count;
        document.getElementById('uptime').textContent = data.uptime;
      });
  }
  fetchMonitor();
  setInterval(fetchMonitor, 5000);
</script>
</body>
</html>
